services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nora
      POSTGRES_PASSWORD: nora
      POSTGRES_DB: nora_videoplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      NORA_DATABASE_URL: postgresql+asyncpg://nora:nora@db:5432/nora_videoplatform
      NORA_SECRET_KEY: dev-secret-change-in-production
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
